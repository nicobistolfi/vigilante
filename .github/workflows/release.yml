name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: main
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          install-only: true

      - name: Verify tag policy
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ! printf '%s\n' "$TAG_NAME" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Release tags must use the format v{x}.{y}.{z}."
            exit 1
          fi

          git fetch origin main

          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "Release tags must point to a commit already merged into main."
            exit 1
          fi

      - name: Validate GoReleaser config
        run: goreleaser check

      - name: Get token for Homebrew tap
        uses: actions/create-github-app-token@v3
        id: tap_token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-spaceship

      - name: Build and publish GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_GITHUB_API_TOKEN: ${{ steps.tap_token.outputs.token }}
        run: goreleaser release --clean
