version: 2

project_name: vigilante

builds:
  - id: vigilante
    main: ./cmd/vigilante
    binary: vigilante
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64

archives:
  - id: release-archives
    ids:
      - vigilante
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{- if eq .Os "darwin" }}macOS{{ else }}Linux{{ end }}_{{ .Arch }}

checksum:
  name_template: checksums.txt

release:
  github:
    owner: nicobistolfi
    name: vigilante

changelog:
  use: github-native
